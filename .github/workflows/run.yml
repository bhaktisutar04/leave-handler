name: Leave Handler

on:
  schedule:
    - cron: "30 18 * * *"   # 00:00 IST (midnight)
    - cron: "30 6 * * *"    # 12:00 IST (noon)
  workflow_dispatch:        # Manual trigger button

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard cap: kills the job if it hangs (e.g. Groq never responds).
    # 15 minutes is more than enough for any normal run.
    # Without this the default is 6 hours, which blocks the next scheduled run.
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Restore processed emails log ──
      # Uses the GitHub API to find the most recent successful artifact by name,
      # regardless of which run produced it. This is more reliable than
      # actions/download-artifact which only looks at artifacts from the current
      # workflow run and fails with "Artifact not found" when the previous run
      # had a different run ID or the artifact wasn't from the immediately prior run.
      - name: Restore processed emails log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Looking for latest processed-emails-log artifact via GitHub API..."

          # Get the most recent artifact named processed-emails-log
          ARTIFACT_URL=$(gh api \
            "/repos/${{ github.repository }}/actions/artifacts?name=processed-emails-log&per_page=1" \
            --jq '.artifacts[0].archive_download_url' 2>/dev/null || echo "")

          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "No previous artifact found — first run or all artifacts expired."
            echo "[]" > processed_emails.json
          else
            echo "Found artifact at: $ARTIFACT_URL"
            # Download and unzip the artifact
            curl -s -L \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$ARTIFACT_URL" \
              -o processed-emails-log.zip

            if unzip -o processed-emails-log.zip processed_emails.json 2>/dev/null; then
              echo "✓ Restored processed_emails.json"
              cat processed_emails.json | head -5
              EMAIL_COUNT=$(grep -o '"' processed_emails.json | wc -l)
              echo "Contains approximately $((EMAIL_COUNT / 2)) processed email IDs"
            else
              echo "⚠ Could not extract processed_emails.json from artifact — starting fresh"
              echo "[]" > processed_emails.json
            fi
            rm -f processed-emails-log.zip
          fi

      # ── Ensure processed_emails.json exists (safety net) ──
      - name: Init processed emails log if missing
        run: |
          if [ ! -f processed_emails.json ]; then
            echo "processed_emails.json missing — creating empty log"
            echo "[]" > processed_emails.json
          fi

      # ── Ensure agent-log.txt exists so the upload step never fails ──
      - name: Init agent log
        run: echo "Agent not yet started" > agent-log.txt

      # ── Run the agent ──
      # PYTHONUNBUFFERED=1 ensures output is written to agent-log.txt in real
      # time rather than buffered — if the process is killed mid-run (timeout,
      # OOM), the log artifact still contains everything up to that point.
      - name: Run agent
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          SLACK_WEBHOOK_URL:      ${{ secrets.SLACK_WEBHOOK_URL }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SCAN_DAYS_BACK:         "2"
          PYTHONUNBUFFERED:       "1"
        run: |
          echo "Starting Leave Handler agent..."
          echo "Working directory: $(pwd)"
          echo "Current time (UTC): $(date -u)"
          echo "Current time (IST): $(TZ=Asia/Kolkata date)"
          echo "Scan window: $SCAN_DAYS_BACK days back"
          echo ""

          python main.py 2>&1 | tee agent-log.txt
          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "Agent finished with exit code: $EXIT_CODE"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Agent failed!"
            exit $EXIT_CODE
          fi

      # ── Save processed emails log for next run ──
      - name: Save processed emails log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: processed-emails-log
          path: processed_emails.json
          retention-days: 90
          overwrite: true

      # ── Upload logs for debugging ──
      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-run-${{ github.run_number }}
          path: |
            agent-log.txt
            processed_emails.json
          retention-days: 30

      # ── Summary ──
      - name: Show summary
        if: always()
        run: |
          echo "======================================="
          echo "  Workflow Summary"
          echo "======================================="

          if [ -f processed_emails.json ]; then
            EMAIL_COUNT=$(cat processed_emails.json | grep -o '"' | wc -l)
            echo "Total processed emails: $((EMAIL_COUNT / 2))"
          fi

          if [ -f agent-log.txt ]; then
            echo ""
            echo "Last 20 lines of agent log:"
            tail -20 agent-log.txt
          fi